services:
  db:
    image: postgres:15
    container_name: postgres_hrm_prod
    restart: unless-stopped
    volumes:
      - /mnt/ebs/hrm/postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrm_network

  redis:
    image: redis:7-alpine
    container_name: hrm_redis
    restart: unless-stopped
    networks:
      - hrm_network

  backend:
    image: ${IMAGE_TAG}
    container_name: hrm-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8008:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      HRM_SERVICE_SECRET: ${HRM_SERVICE_SECRET}
      INVENTORY_SERVICE_URL: http://inventory-backend:8000
      INVENTORY_SERVICE_SECRET: ${INVENTORY_SERVICE_SECRET}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: hrm_service.settings.prod
      DJANGO_ENV: prod
    volumes:
      - /mnt/ebs/hrm/media:/app/media
      - /mnt/ebs/hrm/staticfiles:/app/staticfiles
    networks:
      - hrm_network
      - quidpath_network

  celery:
    image: ${IMAGE_TAG}
    container_name: hrm-celery
    restart: unless-stopped
    command: celery -A hrm_service worker -l info -Q payroll,default
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: hrm_service.settings.prod
    networks:
      - hrm_network
      - quidpath_network

networks:
  hrm_network:
    name: hrm_prod_network
    driver: bridge
  quidpath_network:
    name: prod_quidpath_network
    driver: bridge
    # Docker Compose will create this network if it doesn't exist
    # or reuse it if another service already created it
