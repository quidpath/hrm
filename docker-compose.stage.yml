name: hrm-stage

services:
  db:
    image: postgres:15
    container_name: postgres_hrm_stage
    restart: unless-stopped
    volumes:
      - /mnt/quidpath-hrm-db-stage/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrm_network
      - quidpath_network

  backend:
    image: ${IMAGE_TAG}
    container_name: hrm-backend-stage
    restart: unless-stopped
    ports:
      - "127.0.0.1:8013:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      HRM_SERVICE_SECRET: ${HRM_SERVICE_SECRET}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      ERP_BACKEND_URL: ${ERP_BACKEND_URL}
      REDIS_URL: ${REDIS_URL}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      DJANGO_SETTINGS_MODULE: hrm_service.settings.stage
      DJANGO_ENV: stage
    volumes:
      - /mnt/quidpath-hrm-stage-data/media:/app/media
      - /mnt/quidpath-hrm-stage-data/staticfiles:/app/staticfiles
    networks:
      - hrm_network
      - quidpath_network

networks:
  hrm_network:
    name: hrm_stage_network
    driver: bridge
  quidpath_network:
    external: true
    name: stage_quidpath_network
